services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: kb-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kb}
      POSTGRES_USER: ${POSTGRES_USER:-kb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kb} -d ${POSTGRES_DB:-kb}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb-migrate
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kb:kb@postgres:5432/kb}
    command: ["python", "-m", "app.db.migrator"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kb:kb@postgres:5432/kb}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kb-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kb:kb@postgres:5432/kb}
    command: ["python", "-m", "app.worker_main"]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kb-web
    env_file:
      - .env
    environment:
      KB_BACKEND_URL: ${KB_BACKEND_URL:-http://api:8000}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  postgres_data:
